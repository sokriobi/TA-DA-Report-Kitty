<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitty TA/DA Login & Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Full Screen Login Area -->
  <div id="loginScreen" class="login-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <img src="./kitty-logo.png" alt="Kitty Logo" class="kitty-logo-img" />
      </div>
      <h2>TA/DA Portal</h2>
      <p class="login-instruction">Please log in to continue</p>
      <div class="login-error" id="loginError"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>Email or ID</label>
          <input type="text" id="loginIdentifier" placeholder="Enter your identifier" required />
        </div>
        <div class="form-group password-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Enter your password" required />
            <button type="button" id="togglePassword" class="eye-btn" aria-label="Toggle password visibility">
              <svg id="eyeIcon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn primary btn-block">Log In</button>
      </form>
    </div>

    <!-- Powered by Sokrio Footer -->
    <div class="powered-by">
      <img src="./sokrio-logo.png" alt="Sokrio Logo" class="sokrio-logo-img" />
      <span>Powered by <strong>Sokrio Technologies LTD.</strong></span>
    </div>
  </div>

  <!-- Dashboard Area -->
  <div id="dashboardScreen" class="page hidden">
    <header class="topbar">
      <div class="dash-brand-area">
        <img src="./kitty-logo.png" alt="Kitty Logo" class="kitty-icon-dash" />
        <div class="dash-brand-text">
          <span class="dash-title">TA/DA Dashboard</span>
        </div>
      </div>
      <div class="status-area">
        <span id="sourceBadge" class="badge">Offline</span>
        <div class="status-line" id="liveStatus">Ready</div>
      </div>
    </header>

    <section class="panel filter-panel">
      <div class="grid grid-5">
        <label>
          <span>From Date</span>
          <input id="fromDate" type="date" />
        </label>
        <label>
          <span>To Date</span>
          <input id="toDate" type="date" />
        </label>
        <label>
          <span>Role</span>
          <select id="roleFilter">
            <option value="ALL">All</option>
            <option value="TSM">TSM</option>
            <option value="ZSM">ZSM</option>
            <option value="ADSM">ADSM</option>
            <option value="DSM">DSM</option>
          </select>
        </label>
        <label>
          <span>Name / ID</span>
          <input id="searchText" type="text" placeholder="Search..." list="userSuggestions" />
          <datalist id="userSuggestions"></datalist>
        </label>
        <div class="actions">
          <button id="loadBtn" class="btn primary" style="width: 100%;">Load Data</button>
        </div>
      </div>

      <!-- Checkbox moved here for layout -->
      <div class="extra-filters">
        <label class="checkbox-row">
          <input id="showAllUsers" type="checkbox" />
          <span>Show all users (even with 0 days)</span>
        </label>
        <div style="text-align: center;">
          <button id="downloadBtn" class="btn excel" style="display: none;">Download Excel</button>
        </div>
        <div></div> <!-- Spacer for balance -->
      </div>
    </section>

    <section class="summary-grid">
      <article class="panel summary-card">
        <div class="icon">🚗</div><span>Total TA</span><strong id="sumTA">0</strong>
      </article>
      <article class="panel summary-card">
        <div class="icon">🍔</div><span>Total DA</span><strong id="sumDA">0</strong>
      </article>
      <article class="panel summary-card">
        <div class="icon">💡</div><span>Other</span><strong id="sumOther">0</strong>
      </article>
      <article class="panel summary-card">
        <div class="icon">🎁</div><span>Incentive</span><strong id="sumIncentive">0</strong>
      </article>
      <article class="panel summary-card total">
        <div class="icon">💰</div><span>Grand Total</span><strong id="sumTotal">0</strong>
      </article>
    </section>

    <section class="panel table-panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Role</th>
              <th>Days</th>
              <th>TA</th>
              <th>DA</th>
              <th>Other</th>
              <th>Incentive</th>
              <th>Total</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="billRows">
            <tr>
              <td colspan="10" class="empty">Load data to see bills</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle">Details</h2>
        <button id="closeModal" class="btn light">Close</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>

</html>
